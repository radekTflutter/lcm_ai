<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adaptive Sentinel AI Factory - MLOps No-Code</title>
    <!-- Tailwind: CDN only for dev. For production use PostCSS/CLI: https://tailwindcss.com/docs/installation -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .industrial-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .purple-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <nav class="bg-gray-800 border-b border-purple-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-purple-400">Adaptive Sentinel AI Factory</h1>
                    <span class="ml-4 px-3 py-1 bg-purple-900 text-purple-300 rounded text-sm">MLOps No-Code</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-400">NVIDIA Jetson</span>
                    <span id="cuda-status" class="px-3 py-1 rounded text-sm"></span>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <script>
        // Check CUDA/system status (do not use /api/training/<id>/status/ here)
        fetch('/api/system/status/')
            .then(r => r.ok ? r.json() : Promise.reject(new Error('status ' + r.status)))
            .then(data => {
                const statusEl = document.getElementById('cuda-status');
                if (statusEl) {
                    if (data.cuda_available) {
                        statusEl.textContent = 'CUDA ✓';
                        statusEl.className = 'px-3 py-1 rounded text-sm bg-green-900 text-green-300';
                    } else {
                        statusEl.textContent = 'CPU';
                        statusEl.className = 'px-3 py-1 rounded text-sm bg-yellow-900 text-yellow-300';
                    }
                }
            })
            .catch(() => {
                const statusEl = document.getElementById('cuda-status');
                if (statusEl) { statusEl.textContent = '?'; statusEl.className = 'px-3 py-1 rounded text-sm bg-gray-700'; }
            });
    </script>
</body>
</html>
